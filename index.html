<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Strait of Hormuz Minesweeper</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>   
    <table id="board"></table>
        <!-- GAME OVER MODAL -->
    <div id="gameOverModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header"></div>
            <button id="restartBtn" class="modal-button">RESTART GAME</button>
        </div>
    </div>
 
    <!-- WIN MODAL -->
    <div id="winModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">🎉 YOU WIN!</div>
            <div class="modal-message">You cleared the Strait!</div>
            <button id="restartWinBtn" class="modal-button">PLAY AGAIN</button>
        </div>
    </div>
    <script src="js/cell.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
